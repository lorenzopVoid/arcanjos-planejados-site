<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="360" viewBox="0 0 1200 360" role="img" aria-labelledby="title desc">
  <title id="title">Arcanjos Planejados</title>
  <desc id="desc">Logo em texto dourado da Arcanjos Planejados, fundo transparente.</desc>
  <defs>
    <linearGradient id="gold" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#F3D27A"/>
      <stop offset="34%" stop-color="#D8B25F"/>
      <stop offset="68%" stop-color="#B7852C"/>
      <stop offset="100%" stop-color="#F7E08A"/>
    </linearGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="7" stdDeviation="6" flood-color="#000000" flood-opacity="0.22"/>
      <feDropShadow dx="0" dy="0" stdDeviation="7" flood-color="#D8B25F" flood-opacity="0.20"/>
    </filter>
  </defs>

  <g filter="url(#softShadow)">
    <text x="600" y="175"
      text-anchor="middle"
      font-family="Georgia, 'Times New Roman', serif"
      font-size="142"
      font-weight="600"
      letter-spacing="8"
      fill="url(#gold)">ARCANJOS</text>

    <text x="600" y="250"
      text-anchor="middle"
      font-family="Montserrat, Arial, sans-serif"
      font-size="42"
      font-weight="500"
      letter-spacing="24"
      fill="#D8B25F">PLANEJADOS</text>
  </g>
</svg>
